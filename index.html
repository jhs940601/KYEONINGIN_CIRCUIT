<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>경인고등학교 · 오늘의 운동</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#0d0e10;
  --bg-panel:#17181b;
  --bg-panel-2:#1f2124;
  --line:#2a2c30;
  --text:#f2f1ed;
  --muted:#9a9da5;
  --muted2:#8b8e96;
  --accent:#ff4b2b;
  --accent2:#f2c230;
  --steel:#5c6470;
  --good:#3ecf8e;
  --bad:#ff5c5c;
  --radius:14px;
  --shadow: 0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, #1c1e22 0%, transparent 60%),
    radial-gradient(900px 500px at 110% 10%, #201417 0%, transparent 55%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
}
.wrap{max-width:920px;margin:0 auto;padding:20px 16px 80px;}

/* ---------- Header ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 4px 22px;
  border-bottom:1px solid var(--line);
  margin-bottom:22px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:96px;height:96px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  background:#fff;
  box-shadow: 0 4px 18px rgba(255,75,43,.3);
  border:3px solid var(--line);
}
.brand-mark img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-name{
  font-family:'Oswald',sans-serif;
  letter-spacing:.04em;
  font-size:19px;
  font-weight:700;
  color:var(--text);
  text-transform:uppercase;
  line-height:1.35;
}
.brand-name .sub{
  display:block;
  font-size:13px;
  letter-spacing:.16em;
  color:var(--accent2);
  font-weight:700;
}
.brand-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;letter-spacing:.03em;}

.page-footer{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:40px;padding-top:20px;border-top:1px solid var(--line);
  color:var(--muted2);font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
}
.page-footer img{width:22px;height:22px;border-radius:50%;object-fit:cover;}

.tabs{display:flex;gap:6px;background:var(--bg-panel);padding:5px;border-radius:999px;border:1px solid var(--line);}
.tab-btn{
  border:none;background:transparent;color:var(--muted2);
  font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
  padding:9px 16px;border-radius:999px;cursor:pointer;
  transition:.15s ease;white-space:nowrap;
}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(255,75,43,.35);}
.tab-btn:not(.active):hover{color:var(--text);}

/* ---------- Section labels ---------- */
.eyebrow{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;letter-spacing:.22em;
  font-size:11px;color:var(--accent2);margin-bottom:6px;
}
.h1{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;letter-spacing:.01em;margin:0 0 4px;}
.sub{color:var(--muted2);font-size:14px;margin:0 0 20px;line-height:1.6;}

/* ---------- WOD hero card ---------- */
.hero{
  background:linear-gradient(160deg,var(--bg-panel-2),var(--bg-panel));
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:22px 22px 20px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.hero::before{
  content:"";position:absolute;top:-40px;right:-40px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(255,75,43,.18),transparent 70%);
}
.hero-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;}
.wod-date{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.18em;color:var(--muted2);text-transform:uppercase;}
.wod-title{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;margin:4px 0 10px;}
.wod-meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px;}
.meta-chip{
  display:flex;flex-direction:column;gap:2px;
  border-left:2px solid var(--accent);padding-left:10px;
}
.meta-chip b{font-family:'Oswald',sans-serif;font-size:19px;}
.meta-chip span{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;}

.btn{
  font-family:'Inter',sans-serif;font-weight:700;font-size:14px;
  border:none;border-radius:10px;padding:12px 18px;cursor:pointer;
  transition:.15s ease;
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 6px 18px rgba(255,75,43,.35);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
.btn-ghost:hover{border-color:var(--steel);}
.btn-sm{padding:8px 12px;font-size:12px;border-radius:8px;}

/* ---------- Exercise cards ---------- */
.ex-list{display:flex;flex-direction:column;gap:12px;}
.ex-card{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 16px 14px;
}
.ex-top{display:flex;align-items:center;gap:12px;}
.ex-index{
  font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--steel);
  width:30px;text-align:center;flex-shrink:0;
}
.ex-card.done .ex-index{color:var(--good);}
.ex-name{font-weight:700;font-size:16px;flex:1;}
.ex-target{
  font-family:'Oswald',sans-serif;color:var(--accent2);font-size:14px;font-weight:600;
  white-space:nowrap;
}
.check-btn{
  width:30px;height:30px;border-radius:8px;border:2px solid var(--line);
  background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;
  transition:.15s ease;
}
.ex-card.done .check-btn{background:var(--good);border-color:var(--good);color:#0d0e10;font-weight:900;}
.ex-body{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.sets-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;flex-wrap:wrap;}
.sets-label{font-size:12px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.sets-boxes{display:flex;gap:8px;}
.set-box{
  min-width:38px;height:34px;padding:0 8px;border-radius:8px;
  border:2px solid var(--line);background:var(--bg-panel-2);color:var(--muted2);
  font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;cursor:pointer;
  transition:.15s ease;
}
.set-box.on{background:var(--good);border-color:var(--good);color:#0a0b0c;}
.cautions{list-style:none;margin:0 0 12px;padding:0;display:flex;flex-direction:column;gap:6px;}
.cautions li{font-size:13px;color:var(--muted2);padding-left:16px;position:relative;line-height:1.5;}
.cautions li::before{content:"▲";position:absolute;left:0;top:1px;color:var(--accent);font-size:9px;}
.video-toggle{font-size:12px;color:var(--accent2);background:none;border:none;cursor:pointer;font-weight:700;padding:0;margin-bottom:10px;}
.video-wrap{position:relative;padding-top:56.25%;border-radius:10px;overflow:hidden;background:#000;margin-bottom:4px;}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
.video-fallback{
  display:flex;align-items:center;justify-content:center;height:150px;border-radius:10px;
  background:var(--bg-panel-2);color:var(--muted2);font-size:13px;flex-direction:column;gap:8px;text-align:center;padding:10px;
}
.video-fallback a{color:var(--accent2);text-decoration:none;font-weight:700;}

/* ---------- Follow-along mode ---------- */
.follow-overlay{
  position:fixed;inset:0;background:#0a0b0c;z-index:50;
  display:flex;flex-direction:column;
}
.follow-top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;}
.follow-close{background:none;border:1px solid var(--line);color:var(--muted2);border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;}
.follow-progress{display:flex;gap:6px;padding:0 20px 10px;}
.dot{flex:1;height:4px;border-radius:2px;background:var(--line);}
.dot.on{background:var(--accent);}
.follow-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 20px 30px;text-align:center;}
.follow-idx{font-family:'Oswald',sans-serif;color:var(--muted2);letter-spacing:.2em;font-size:13px;text-transform:uppercase;}
.follow-name{font-family:'Oswald',sans-serif;font-size:clamp(28px,6vw,46px);font-weight:700;margin:6px 0 14px;}
.follow-target{font-family:'Oswald',sans-serif;color:var(--accent2);font-size:22px;font-weight:700;margin-bottom:18px;}
.follow-video{width:100%;max-width:640px;position:relative;padding-top:56.25%;border-radius:14px;overflow:hidden;background:#000;margin-bottom:18px;}
.follow-video iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
.follow-cautions{max-width:520px;text-align:left;margin:0 0 22px;}
.follow-nav{display:flex;gap:12px;}

/* ---------- Tabata timer ---------- */
.timer-phase{
  font-family:'Oswald',sans-serif;letter-spacing:.3em;font-size:14px;text-transform:uppercase;
  padding:5px 16px;border-radius:999px;margin-bottom:10px;font-weight:700;
}
.timer-phase.work{background:rgba(255,75,43,.18);color:var(--accent);}
.timer-phase.rest{background:rgba(62,207,142,.16);color:var(--good);}
.timer-num{
  font-family:'Oswald',sans-serif;font-weight:700;
  font-size:clamp(100px,32vw,220px);line-height:1;
  margin:10px 0 10px;
  font-variant-numeric:tabular-nums;
}
.timer-num.work{color:var(--accent);}
.timer-num.rest{color:var(--good);}
.timer-sub{font-size:13px;color:var(--muted2);margin-bottom:10px;letter-spacing:.05em;}
.set-pills{display:flex;gap:8px;margin-bottom:16px;}
.set-pill{
  width:10px;height:10px;border-radius:50%;background:var(--line);
}
.set-pill.on{background:var(--accent2);}
.timer-controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;}

/* ---------- Peer eval ---------- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;}
.field input, .field select{
  width:100%;background:var(--bg-panel-2);border:1px solid var(--line);border-radius:8px;
  padding:11px 12px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;
}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.eval-card{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.eval-card h3{font-family:'Oswald',sans-serif;margin:0 0 12px;font-size:17px;}
.eval-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line);}
.eval-item:first-of-type{border-top:none;}
.eval-q{font-size:13.5px;flex:1;line-height:1.4;}
.scale5{display:flex;gap:5px;flex-shrink:0;}
.scale5-btn{
  width:30px;height:30px;border-radius:7px;
  border:1px solid var(--line);background:var(--bg-panel-2);color:var(--muted2);
  font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;cursor:pointer;
  transition:.15s ease;
}
.scale5-btn.sel.s1{background:#ff5c5c;border-color:#ff5c5c;color:#fff;}
.scale5-btn.sel.s2{background:#ff8a5c;border-color:#ff8a5c;color:#0a0b0c;}
.scale5-btn.sel.s3{background:#f2c230;border-color:#f2c230;color:#0a0b0c;}
.scale5-btn.sel.s4{background:#8fd15a;border-color:#8fd15a;color:#0a0b0c;}
.scale5-btn.sel.s5{background:var(--good);border-color:var(--good);color:#0a0b0c;}
.scale-hint{text-align:right;font-size:11px;color:var(--muted2);margin-top:8px;}
.eval-score{text-align:right;font-family:'Oswald',sans-serif;color:var(--accent2);font-size:13px;margin-top:6px;}
.submit-bar{position:sticky;bottom:12px;display:flex;justify-content:flex-end;margin-top:10px;}
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--good);color:#0a0b0c;padding:12px 20px;border-radius:10px;font-weight:700;
  box-shadow:var(--shadow);z-index:100;font-size:14px;
}

/* ---------- Teacher mode ---------- */
.preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.preset-btn{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:10px;padding:14px 10px;
  color:var(--text);cursor:pointer;text-align:center;font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;
}
.preset-btn:hover{border-color:var(--accent);}
.lib-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.lib-item{
  display:flex;align-items:center;gap:10px;background:var(--bg-panel);border:1px solid var(--line);
  border-radius:10px;padding:10px 12px;
}
.lib-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
.lib-item .name{flex:1;font-size:14px;font-weight:600;}
.lib-item input[type=text]{width:80px;background:var(--bg-panel-2);border:1px solid var(--line);border-radius:6px;padding:6px 8px;color:var(--text);font-size:13px;}

/* ---------- 동료평가 제출 로스터 ---------- */
.roster-wrap{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:26px;}
.roster-board{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto;}
.roster-row{display:flex;align-items:center;gap:10px;}
.roster-ban-label{
  width:40px;flex-shrink:0;font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;color:var(--muted2);
}
.roster-chips{display:flex;flex-wrap:wrap;gap:5px;}
.roster-chip{
  width:26px;height:26px;border-radius:6px;background:var(--bg-panel-2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted2);font-weight:600;
  cursor:default;
}
.roster-chip.on{background:var(--good);border-color:var(--good);color:#0a0b0c;font-weight:800;}

.empty{
  text-align:center;color:var(--muted2);padding:50px 20px;font-size:14px;
  background:var(--bg-panel);border:1px dashed var(--line);border-radius:var(--radius);
}
.badge{
  display:inline-block;background:var(--bg-panel-2);border:1px solid var(--line);color:var(--muted2);
  font-size:11px;padding:3px 9px;border-radius:999px;margin-left:8px;font-weight:700;
}

/* ---------- 기록 대결 리더보드 ---------- */
.rt-badge{
  display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--good);
  font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;
}
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 0 rgba(62,207,142,.6);animation:pulse 1.6s infinite;}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(62,207,142,.55);}
  70%{box-shadow:0 0 0 8px rgba(62,207,142,0);}
  100%{box-shadow:0 0 0 0 rgba(62,207,142,0);}
}
.record-form{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:22px;}
.record-form .row2{margin-bottom:12px;}
.lb-board{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.lb-row{
  display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);
}
.lb-row:last-child{border-bottom:none;}
.lb-rank{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;width:28px;text-align:center;color:var(--steel);
}
.lb-row.top1 .lb-rank{color:#ffd54a;}
.lb-row.top2 .lb-rank{color:#cfd4da;}
.lb-row.top3 .lb-rank{color:#d99a5b;}
.lb-name{flex:1;font-weight:700;font-size:14.5px;}
.lb-class{font-size:12px;color:var(--muted2);margin-left:6px;font-weight:500;}
.lb-value{font-family:'Oswald',sans-serif;font-weight:700;font-size:18px;color:var(--accent2);}
@media(max-width:520px){
  .row2{grid-template-columns:1fr;}
  .hero-row{flex-direction:column;}
  .topbar{flex-direction:column;align-items:stretch;gap:16px;padding:10px 4px 18px;}
  .brand{justify-content:flex-start;}
  .brand-mark{width:58px;height:58px;border-width:2px;}
  .brand-name{font-size:16px;}
  .brand-name .sub{font-size:11px;}
  .tabs{
    width:100%;overflow-x:visible;
    display:grid;grid-template-columns:repeat(2,1fr);gap:6px;
    border-radius:14px;padding:6px;
  }
  .tab-btn{padding:10px 6px;font-size:12px;white-space:normal;line-height:1.3;}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

function setsCountOf(v){

}
function setLabelOf(v, i){

let sharedAudioCtx = null;
function getAudioCtx(){
  if(!sharedAudioCtx){
    try{ sharedAudioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; }
  }
  if(sharedAudioCtx.state === "suspended"){ sharedAudioCtx.resume().catch(()=>{}); }
  return sharedAudioCtx;
}
function beep(freq, dur){
  const ctx = getAudioCtx(); if(!ctx) return;
  try{
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.frequency.value = freq; o.type="sine";
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    o.start(); o.stop(ctx.currentTime + dur);
  }catch(e){}
}

/* =========================================================
   운동용 배경음악 (전부 코드로 직접 합성 - 외부 음원 없음,
   저작권 걱정 없이 사용할 수 있는 자체 생성 비트)
========================================================= */
function playKick(time){
  const ctx = getAudioCtx(); if(!ctx) return;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.frequency.setValueAtTime(150, time);
  osc.frequency.exponentialRampToValueAtTime(45, time+0.15);
  gain.gain.setValueAtTime(0.9, time);
  gain.gain.exponentialRampToValueAtTime(0.01, time+0.22);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(time); osc.stop(time+0.22);
}
function playHihat(time, open){
  const ctx = getAudioCtx(); if(!ctx) return;
  const dur = open ? 0.14 : 0.045;
  const bufferSize = Math.floor(ctx.sampleRate*dur);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = Math.random()*2-1;
  const noise = ctx.createBufferSource(); noise.buffer = buffer;
  const hp = ctx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=7500;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(open?0.14:0.22, time);
  gain.gain.exponentialRampToValueAtTime(0.01, time+dur);
  noise.connect(hp); hp.connect(gain); gain.connect(ctx.destination);
  noise.start(time); noise.stop(time+dur);
}
function playBassNote(time, freq){
  const ctx = getAudioCtx(); if(!ctx) return;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.type="sawtooth"; osc.frequency.setValueAtTime(freq, time);
  const filt = ctx.createBiquadFilter(); filt.type="lowpass"; filt.frequency.value=900;
  gain.gain.setValueAtTime(0.16, time);
  gain.gain.exponentialRampToValueAtTime(0.01, time+0.16);
  osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
  osc.start(time); osc.stop(time+0.18);
}

const MUSIC_BPM = 126;
const MUSIC_STEP = 60/MUSIC_BPM/4; // 16분음표 간격
// 16스텝 1마디, 베이스라인 (Hz, 0=쉼표) - A마이너 느낌의 심플한 워크아웃 리프
const MUSIC_BASS = [55,0,55,0,0,0,55,0,65.41,0,65.41,0,0,0,49,0];

let music = { playing:false, intervalId:null, step:0, nextTime:0 };

function musicScheduler(){
  const ctx = getAudioCtx(); if(!ctx) return;
  while(music.nextTime < ctx.currentTime + 0.12){
    const step = music.step % 16;
    if(step % 4 === 0) playKick(music.nextTime);
    if(step % 2 === 1) playHihat(music.nextTime, step===15);
    if(MUSIC_BASS[step]) playBassNote(music.nextTime, MUSIC_BASS[step]);
    music.nextTime += MUSIC_STEP;
    music.step++;
  }
}
function startWorkoutMusic(){
  const ctx = getAudioCtx(); if(!ctx || music.playing || !state.musicOn) return;
  music.playing = true;
  music.step = 0;
  music.nextTime = ctx.currentTime + 0.1;
  music.intervalId = setInterval(musicScheduler, 25);
}
function stopWorkoutMusic(){
  music.playing = false;
  if(music.intervalId){ clearInterval(music.intervalId); music.intervalId=null; }
}
function toggleWorkoutMusic(){
  state.musicOn = !state.musicOn;
  if(state.musicOn) startWorkoutMusic(); else stopWorkoutMusic();
}

/* ---- 타이머 관리 (타바타 프리셋 전용) ---- */
function clearTimerInterval(){
  if(state.timer && state.timer.intervalId){ clearInterval(state.timer.intervalId); state.timer.intervalId=null; }
}
function initTimerForCurrentExercise(){
  const id = state.wod.ids[state.followIdx];
  const setsVal = getSetsInfoFor(id);
  clearTimerInterval();
  state.timer = {
    setIdx: 0,
    totalSets: setsCountOf(setsVal),
    setsVal,
    phase: "work",
    remaining: state.followTimerConfig.work,
    running: true
  };
  state.timer.intervalId = setInterval(tabataTick, 1000);
}
function tabataTick(){
  if(!state.timer || !state.timer.running) return;
  state.timer.remaining -= 1;
  if(state.timer.remaining <= 0){
    beep(880,0.15);
    advanceTabataPhase();
    if(state.followMode) render();
  } else {
    if(state.timer.remaining <= 3) beep(660,0.08);
    const numEl = document.getElementById("timerNum");
    if(numEl) numEl.textContent = state.timer.remaining;
  }
}
function advanceTabataPhase(){
  const t = state.timer;
  if(!t) return;
  if(t.phase === "work"){
    t.phase = "rest";
    t.remaining = state.followTimerConfig.rest;
    return;
  }
  // rest finished -> next set or next exercise
  t.setIdx += 1;
  if(t.setIdx < t.totalSets){
    t.phase = "work";
    t.remaining = state.followTimerConfig.work;
    return;
  }
  const id = state.wod.ids[state.followIdx];
  const arrDone = getProgressArray(id);
  arrDone.fill(true);
  storeSet("progress:" + todayStr(), state.progress, false);
  if(state.followIdx < state.wod.ids.length - 1){
    state.followIdx += 1;
    initTimerForCurrentExercise();
  } else {
    clearTimerInterval();
    state.timer = null;
    state.followMode = false;
    state.followTimerConfig = null;
    stopWorkoutMusic();
    showToast("오늘의 WOD 완료! 수고했어요 💪");
  }
}

  state.timer = null;
  state.followMode = false;
  state.followTimerConfig = null;
  stopWorkoutMusic();
  render();
}

// 동료평가 제출 1건을 구글시트 행(동작 단위)으로 변환
// 컬럼: 날짜, 차시, 관찰자반, 관찰자번호, 관찰자이름, 수행자이름, WOD, 동작명, 항목별점수, 평균점수, 제출시각
function buildEvalSheetRows(payload){
  const rows = [];
  const tsIso = new Date(payload.ts).toISOString();
  Object.keys(payload.answers).forEach(exId=>{
    const ex = LIB[exId];
    if(!ex) return;
    const a = payload.answers[exId];
    const scores = ex.checklist.map((q,qi)=> (typeof a[qi]==="number" ? a[qi] : "")).filter(v=>v!=="");
    if(scores.length===0) return;
    const avg = scores.reduce((x,y)=>x+y,0) / scores.length;
    rows.push([
      payload.date, payload.cha, payload.observerBan, payload.observerBeon,
      payload.observerName, payload.performer, payload.wodTitle, ex.name,
      scores.join(","), avg.toFixed(1), tsIso
    ]);
  });
  return rows;
}

function generateFeedbackSummary(answers, evalIds){
  let totalScore=0, totalCount=0;
  const perEx = []; // {id, name, avg, total, items:[{q,score}], lowItems, highItems}
  evalIds.forEach(id=>{
    const a = answers[id];
    if(!a) return;
    const ex = LIB[id];
    let sum=0, total=0; const items=[], lowItems=[], highItems=[];
    ex.checklist.forEach((q,qi)=>{
      const v = a[qi];
      if(typeof v !== "number") return;
      total++; sum += v;
      items.push({q, score:v});
      if(v<=3) lowItems.push({q, score:v});
      if(v>=5) highItems.push({q, score:v});
    });
    if(total>0){
      perEx.push({id, name:ex.name, avg: sum/total, total, items, lowItems, highItems});
      totalScore += sum; totalCount += total;
    }
  });

  if(totalCount===0){
    return [
      "아직 체크된 평가 항목이 없어요.",
      "체크리스트를 하나 이상 눌러 평가한 뒤 제출해 주세요.",
      "관찰자가 항목별로 1~5점을 눌러야 요약이 만들어져요.",
    ];
  }

  const lines = [];
  const overallAvg = totalScore/totalCount;
  const sortedByAvg = perEx.slice().sort((a,b)=> b.avg - a.avg);
  const best = sortedByAvg[0];
  const second = sortedByAvg[1];
  const worst = sortedByAvg[sortedByAvg.length-1];
  const spread = best.avg - worst.avg;

  // 1. 전체 총평
  lines.push(`총 ${evalIds.filter(id=>answers[id]).length}개 동작, ${totalCount}개 평가 항목의 평균 점수는 ${overallAvg.toFixed(1)} / 5.0점이에요.`);

  // 2. 전체 수준 코멘트
  if(overallAvg>=4.5) lines.push("전반적으로 기준 동작을 매우 정확하게 수행하고 있어요. 훌륭해요!");
  else if(overallAvg>=3.5) lines.push("전반적으로 양호한 자세를 유지하고 있고, 조금만 더 다듬으면 훨씬 좋아질 거예요.");
  else if(overallAvg>=2.5) lines.push("기본적인 동작은 되고 있지만, 세부 자세에서 신경 쓸 부분이 몇 가지 보여요.");
  else lines.push("아직 기준 자세를 따라가는 데 어려움이 있어 보여요. 천천히, 정확하게 연습해 봐요.");

  // 3. 가장 잘한 동작
  if(best.avg>=4.5) lines.push(`특히 '${best.name}' 동작은 평균 ${best.avg.toFixed(1)}점으로 기준을 거의 완벽하게 충족했어요. 아주 좋아요!`);
  else lines.push(`'${best.name}' 동작에서 평균 ${best.avg.toFixed(1)}점으로 가장 좋은 평가를 받았어요.`);

  // 4. 가장 잘한 동작의 구체적인 강점 항목
  if(best.highItems.length>0){
    lines.push(`특히 "${best.highItems[0].q}" 항목에서 만점(5점)을 받았어요.`);
  } else {
    lines.push(`'${best.name}' 동작은 큰 오차 없이 안정적으로 수행하고 있어요.`);
  }

  // 5. 두 번째로 잘한 동작 (있는 경우)
  if(second){
    lines.push(`'${second.name}' 동작도 평균 ${second.avg.toFixed(1)}점으로 좋은 편이에요.`);
  } else {
    lines.push(`이번 시간은 '${best.name}' 한 동작을 집중적으로 평가했어요.`);
  }

  // 6. 동작 간 편차 코멘트
  if(perEx.length>1){
    if(spread>=1.5) lines.push(`동작별 점수 차이가 꽤 있는 편이에요(최고 ${best.avg.toFixed(1)}점, 최저 ${worst.avg.toFixed(1)}점). 약한 동작 위주로 연습해 보세요.`);
    else lines.push(`동작별 점수 편차가 크지 않아 전반적으로 고르게 잘 수행하고 있어요.`);
  } else {
    lines.push(`다음 시간에는 다른 동작들도 함께 평가해 보면 더 정확한 비교가 가능할 거예요.`);
  }

  // 7. 개선이 필요한 동작
  const needsWork = perEx.filter(e=>e.lowItems.length>0).sort((a,b)=> a.avg - b.avg)[0];
  if(needsWork){
    lines.push(`가장 신경 써야 할 동작은 '${needsWork.name}'이에요 (평균 ${needsWork.avg.toFixed(1)}점).`);
  } else {
    lines.push(`감점된 항목이 없어요. 지금처럼만 유지해도 좋아요.`);
  }

  // 8. 구체적인 미흡 항목 1
  if(needsWork){
    const sortedLow = needsWork.lowItems.slice().sort((a,b)=>a.score-b.score);
    const worstItem = sortedLow[0];
    lines.push(`특히 "${worstItem.q}" 부분에서 ${worstItem.score}점을 받았어요. 이 부분을 다음 시간에 다시 확인해 보세요.`);

    // 9. 구체적인 미흡 항목 2 (있으면), 없으면 다른 개선 동작
    if(sortedLow[1]){
      lines.push(`"${sortedLow[1].q}" 항목도 ${sortedLow[1].score}점으로 함께 점검해 보면 좋겠어요.`);
    } else {
      const needsWork2 = perEx.filter(e=>e.id!==needsWork.id && e.lowItems.length>0).sort((a,b)=>a.avg-b.avg)[0];
      if(needsWork2) lines.push(`'${needsWork2.name}' 동작도 평균 ${needsWork2.avg.toFixed(1)}점으로 함께 살펴보면 좋겠어요.`);
      else lines.push(`나머지 항목들은 모두 기준을 잘 충족했어요.`);
    }
  } else {
    lines.push(`모든 항목이 4점 이상으로, 큰 약점 없이 고르게 잘하고 있어요.`);
    lines.push(`현재 수준을 유지하면서 반복 횟수나 속도를 조금씩 늘려보는 것도 좋겠어요.`);
  }

  // 10. 마무리 격려
  lines.push(`동료의 관찰과 피드백을 참고해서, 다음 시간에는 오늘보다 한 단계 더 정확한 자세로 도전해 보세요!`);

  return lines.slice(0,10);
}

    const chips = document.createElement("div");

    for(let beon=1; beon<=30; beon++){
      const key = ban+"-"+beon;
      const subs = doneMap[key];
      const chip = document.createElement("div");
      chip.className = "roster-chip" + (subs ? " on" : "");
      chip.textContent = beon;
      if(subs){
        const names = subs.map(s=>s.observerName).join(", ");
        chip.title = `${ban}반 ${beon}번 (${names}) - ${subs.length}건 제출`;
      } else {
        chip.title = `${ban}반 ${beon}번 - 미제출`;
      }
      chips.appendChild(chip);
    }
    row.appendChild(chips);
    rosterBoard.appendChild(row);
  }
  wrap.appendChild(rosterBoard);

  return wrap;
}

/* =========================================================
   교사 모드 - 동료평가지 제출 현황 수합
   (list API에 의존하지 않고, 날짜별 공유 인덱스 키 하나에
   제출 내역을 누적하는 방식 - 더 안정적으로 동작합니다)
========================================================= */
function evalIndexKey(){
  return "peereval_index:" + todayStr();
}
async function appendEvalToIndex(payload){
  const key = evalIndexKey();
  let list = [];
  try{
    const cur = await storeGet(key, true);
    if(Array.isArray(cur)) list = cur;
  }catch(e){ /* 인덱스가 아직 없으면 빈 배열로 시작 */ }
  list.push(payload);
  await storeSet(key, list, true);
  // 개별 기록도 백업으로 함께 저장 (선택적, 상세 조회용)
  try{ await storeSet("peereval:" + todayStr() + ":" + payload.ts, payload, true); }catch(e){}
}
async function fetchEvalSubmissions(){
  try{
    const list = await storeGet(evalIndexKey(), true);
    state.evalSubmissions = Array.isArray(list) ? list : [];
  }catch(e){
    console.error("동료평가 제출 현황 로드 실패", e);
    state.evalSubmissions = [];
  }
  if(state.tab === "teacher") render();
}

/* =========================================================
   기록 대결 (Supabase 실시간 리더보드)
========================================================= */
async function fetchLeaderboard(){
  if(!sb) return;
  try{
    const { data, error } = await sb
      .from("wod_leaderboard")
      .select("*")
      .eq("wod_date", todayStr())
      .eq("exercise_id", RECORD_EXERCISE_ID)
      .order("record_value", { ascending:false })
      .limit(30);
    if(error){ console.error(error); return; }
    state.leaderboardCache = data || [];
    if(state.tab === "record") render();
  }catch(e){ console.error(e); }
}

function subscribeRealtimeOnce(){
  if(state.rtSubscribed || !sb) return;
  state.rtSubscribed = true;
  sb.channel("wod-leaderboard-changes")
    .on("postgres_changes", { event:"INSERT", schema:"public", table:"wod_leaderboard" }, (payload)=>{
      const row = payload.new;
      if(row.wod_date !== todayStr() || row.exercise_id !== RECORD_EXERCISE_ID) return;
      const list = state.leaderboardCache || [];
      list.push(row);
      list.sort((a,b)=> b.record_value - a.record_value);
      state.leaderboardCache = list.slice(0,30);
      showToast(`${row.student_name} 님이 새 완주 기록을 등록했어요 🔥`);
    })
    .subscribe();
}

async function submitRecord(){
  if(!sb){ showToast("Supabase 연결에 문제가 있어요"); return; }
  const reps = Number(state.recordReps);
  if(!state.recordName || !reps || reps<=0){
    showToast("이름과 총 수행 횟수를 입력해 주세요"); return;
  }
  const classGroup = `1학년 ${state.recordBan}반 ${state.recordBeon}번`;
  const payload = {
    wod_date: todayStr(),
    wod_title: state.wod.title,
    exercise_id: RECORD_EXERCISE_ID,
    exercise_name: RECORD_EXERCISE_NAME,
    student_name: state.recordName,
    class_group: classGroup,
    record_value: reps,
    record_unit: "회"
  };
  const { error } = await sb.from("wod_leaderboard").insert(payload);
  if(error){ console.error(error); showToast("등록 중 오류가 발생했어요"); return; }
  postToSheet("record", [
    [todayStr(), state.wod.title, classGroup, state.recordName, reps, new Date().toISOString()]
  ]);
  showToast("기록이 등록됐어요! 실시간 반영 🔥");
  state.recordReps = "";
  render();
}
